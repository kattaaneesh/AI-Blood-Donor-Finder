<!DOCTYPE html>
<html>
<head>
<title>All Donors</title>
<link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
</head>
<body>

<div class="container">

<h2>Registered Donors</h2>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Blood Group</th>
<th>Phone</th>
<th>City</th>
</tr>

{% for d in data %}

<tr>
<td>{{d[0]}}</td>
<td>{{d[1]}}</td>
<td>{{d[3]}}</td>
<td>{{d[4]}}</td>
<td>{{d[5]}}</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
