<!DOCTYPE html>
<html>
<head>
<title>Search Donor</title>
<link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
</head>
<body>

<div class="container">

<h2>Search Donors</h2>

<form method="POST">

<select name="blood_group">

<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>

<button type="submit">
Search
</button>

</form>

<hr>

{% for donor in results %}

<div class="card">

<h3>{{ donor[1] }}</h3>

<p>Blood Group: {{ donor[3] }}</p>
<p>Phone: {{ donor[4] }}</p>
<p>City: {{ donor[5] }}</p>

</div>

{% endfor %}

</div>

</body>
</html>
